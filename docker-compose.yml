services:
  app:
    build: .
    container_name: codecpos-app
    restart: unless-stopped
    tty: true
    env_file:
      - .env
    volumes:
      - app_code:/var/www/html
      - storage_data:/var/www/html/storage
      - public_storage:/var/www/html/public/storage
    depends_on:
      - db
      - redis
    networks:
      - codecpos-network

  nginx:
    image: nginx:alpine
    container_name: codecpos-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - app_code:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - storage_data:/var/www/html/storage
      - public_storage:/var/www/html/public/storage
    depends_on:
      - app
    networks:
      - codecpos-network

  db:
    image: mariadb:10.11
    container_name: codecpos-db
    restart: unless-stopped
    tty: true
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - codecpos-network
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: codecpos-phpmyadmin
    restart: unless-stopped
    ports:
      - "8089:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    networks:
      - codecpos-network

  redis:
    image: redis:alpine
    container_name: codecpos-redis
    restart: unless-stopped
    networks:
      - codecpos-network

  queue:
    build: .
    container_name: codecpos-queue
    command: php artisan queue:work --tries=3 --timeout=90
    restart: unless-stopped
    depends_on:
      - app
      - redis
    networks:
      - codecpos-network

  scheduler:
    build: .
    container_name: codecpos-scheduler
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - codecpos-network

networks:
  codecpos-network:
    driver: bridge

volumes:
  dbdata:
  storage_data:
  public_storage:
  app_code:
