services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codecpos-app
    restart: unless-stopped
    tty: true
    environment:
      APP_ENV: production
      DB_HOST: db
      REDIS_HOST: redis
    volumes:
      - ./:/var/www # Bind mount untuk membaca .env di host
      - /var/www/vendor # Lindungi vendor internal
      - assets:/var/www/public/build
      - public_html:/var/www/public
      - ./storage:/var/www/storage
    networks:
      - app

  # Database Service
  db:
    image: mariadb:10.11
    container_name: codecpos-db
    restart: unless-stopped
    tty: true
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - codecpos-network
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Redis Service
  redis:
    image: redis:alpine
    container_name: codecpos-redis
    restart: unless-stopped
    networks:
      - codecpos-network

  # phpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: codecpos-phpmyadmin
    restart: unless-stopped
    ports:
      - "8089:80"
    environment:
      PMA_HOST: db
      PMA_ARBITRARY: 1
    networks:
      - codecpos-network

networks:
  codecpos-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  assets:
    driver: local
  public_html:
    driver: local
